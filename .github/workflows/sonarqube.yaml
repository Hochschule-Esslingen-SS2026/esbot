name: Build

on:
  # This enables the manual 'Run workflow' button in the Forgejo UI
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Change this to the version your project uses (e.g., 6.0.x, 7.0.x, 8.0.x)
          dotnet-version: "10.0.x"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Build and analyze
        shell: bash
        working-directory: ./EsBot-Server
        run: |
          export PATH="$PATH:$GITHUB_WORKSPACE/.sonar/scanner"

          dotnet-sonarscanner begin \
            /k:"EsBot" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}"

          dotnet build /p:EnableWindowsTargeting=true /p:IgnoreWindowsTargetingError=true

          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

