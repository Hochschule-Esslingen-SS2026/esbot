# Version 1.0.0

name: CI
on:
    workflow_dispatch:

jobs:
    test:
        runs-on: docker

        steps:
            - uses: actions/checkout@v4

            - name: Set up .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore EsBot-Server/EsBot.sln

            - name: Build
              run: dotnet build EsBot-Server/EsBot.sln --no-restore --configuration Release

            - name: Run tests
              run: dotnet test EsBot-Server/EsBot.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: test-results
                  path: "**/*.trx"
    owasp:
        runs-on: docker
        steps:
            - uses: actions/checkout@v4

            - name: Check formatting
              run: dotnet format EsBot-Server/EsBot.sln --verify-no-changes

            - name: Run OWASP Dependency-Check
              uses: dependency-check/Dependency-Check_Action@main
              with:
                  project: EsBot
                  path: .
                  format: HTML
                  out: reports
                  args: --enableRetired

            - name: Upload Dependency-Check report
              uses: actions/upload-artifact@v4
              with:
                  name: dependency-check-report
                  path: reports
